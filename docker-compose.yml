# NearMe Mobile - Docker Compose
# Run: docker compose up
# Rebuild: docker compose up --build
# Stop: docker compose down
# Updated: March 2026

services:
  nearme-mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nearme-mobile-app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8081:8081"     # Metro bundler
      - "8082:8082"     # Expo DevTools (SDK 54+)
      - "19000:19000"   # Expo dev server
      - "19001:19001"   # Expo dev tools
      - "19002:19002"   # Expo web interface
    volumes:
      # Mount source code for live reload (hot reload)
      - ./src:/app/src
      - ./assets:/app/assets
      - ./app.config.js:/app/app.config.js
      - ./babel.config.js:/app/babel.config.js
      - ./metro.config.js:/app/metro.config.js
      - ./index.js:/app/index.js
      # Don't override node_modules (use container's installed version)
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    # Pass .env file if it exists (API keys, etc.)
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true
    # Healthcheck mirrors Dockerfile but can override here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    # Restart policy
    restart: unless-stopped
