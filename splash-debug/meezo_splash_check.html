<title>Meezo Splash Debug</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;display:grid;place-items:center;min-height:100vh;padding:16px}
.wrap{width:min(100%,420px);height:520px;border-radius:16px;overflow:hidden;background:#06C168;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.35)}
.scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:absolute;inset:0}
.logo-svg{width:86%;max-width:360px;height:auto;display:block}
.letter{opacity:0;transform:translateY(70px) scale(.5);transform-origin:50% 50%}
.tagline{font-size:13px;font-weight:600;color:rgba(0,0,0,.45);letter-spacing:5px;text-transform:uppercase;opacity:0;margin-top:14px;transform:translateY(10px)}
.dot{width:7px;height:7px;border-radius:50%;background:#000;opacity:0;display:inline-block;transform:scale(0)}
.dots-row{display:flex;align-items:center;justify-content:center;margin-top:18px;gap:4px}
.black-cover{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:10}
.home-screen{position:absolute;inset:0;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:36px;opacity:0;pointer-events:none;z-index:5}
.home-header{font-family:Arial Black,sans-serif;font-size:22px;font-weight:900;color:#06C168;margin-bottom:5px}
.home-sub{font-size:12px;color:#999;letter-spacing:3px}
.home-card{width:82%;max-width:300px;background:#fff;border-radius:14px;margin-top:20px;padding:16px;border:1px solid #eee}
.home-card-title{font-size:15px;font-weight:700;color:#222;margin-bottom:3px}
.home-card-sub{font-size:12px;color:#aaa}
.home-card-img{width:100%;height:56px;background:#06C168;border-radius:8px;margin-bottom:10px;opacity:.22}
.replay-btn{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,.12);color:#000;border:none;padding:7px 15px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600;z-index:20}
.replay-btn:hover{background:rgba(0,0,0,.22)}
.note{margin-top:12px;color:#ddd;font-size:12px;text-align:center}
</style>
</head>

    <div class="tagline" id="tagline">food delivery</div>
    <div class="dots-row">
      <span class="dot" id="d0"></span>
      <span class="dot" id="d1"></span>

    </div>

  <div class="black-cover" id="blackCover"></div>

  <div class="home-screen" id="homeScreen">
    <div class="home-header">MEEZO</div>
    <div class="home-sub">FOOD DELIVERY</div>
    <div class="home-card">
      <div class="home-card-img"></div>

    </div>
  </div>

  <button class="replay-btn" onclick="startAnim()">↺ Replay</button>
</div>

<div class="note">Debug page mirrors React Native splash timing and path logo.</div>

<script>
const easeOutBack = t => { const c=1.70158,c3=c+1; return 1+c3*Math.pow(t-1,3)+c*Math.pow(t-1,2); };
const easeOut = t => 1 - Math.pow(1 - t, 4);
const easeIn = t => t * t * t;

function tween(duration, delay, update, easeF) {
  return new Promise(res => {
    setTimeout(() => {
      const s = performance.now();
      const fn = now => {
        const p = Math.min((now-s)/duration,1);
        update((easeF||easeOut)(p));
        if(p<1) requestAnimationFrame(fn); else res();
      };
      requestAnimationFrame(fn);
    }, delay||0);
  });
}

function reset() {
  ["lM","lE1","lE2","lZ","lO"].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = 0;
    el.style.transform = "translateY(70px) scale(0.5)";
  });
  const tag = document.getElementById("tagline");
  tag.style.opacity = 0;
  tag.style.transform = "translateY(10px)";

  ["d0","d1","d2"].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = 0;
    el.style.transform = "scale(0)";
  });

  document.getElementById("scene").style.opacity = 1;
  document.getElementById("scene").style.transform = "scale(1)";
  document.getElementById("blackCover").style.opacity = 0;

  const home = document.getElementById("homeScreen");
  home.style.opacity = 0;
}

function startAnim() {
  reset();
  const ids=["lM","lE1","lE2","lZ","lO"];

  ids.forEach((id,i) => {
    tween(440,100+i*80,e => {
      const el = document.getElementById(id);
      el.style.opacity = Math.min(e*1.7,1);
      el.style.transform = `translateY(${70-70*e}px) scale(${0.5+0.5*e})`;
    },easeOutBack);
  });

  const landed = 100 + 4*80 + 440;

  tween(300, landed, e => {
    const tag = document.getElementById("tagline");
    tag.style.opacity = e*0.45;
    tag.style.transform = `translateY(${10-10*e}px)`;
  });

  setTimeout(() => {
    doPulse().then(() => {
      setTimeout(() => {
        doWave().then(() => setTimeout(doZoomExit,180));
      },200);
    });
  }, landed + 180);
}

function doPulse() {
  return new Promise(res => {
    const ids=["lM","lE1","lE2","lZ","lO"]; let done=0;
    ids.forEach((id,i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        const s = performance.now();
        const fn = now => {
          const p = Math.min((now-s)/300,1);
          const sc = p<0.5 ? 1+0.09*(p*2) : 1+0.09*(1-(p-0.5)*2);
          el.style.transform = `translateY(0px) scale(${sc})`;
          if (p<1) requestAnimationFrame(fn);
          else { el.style.transform = "translateY(0px) scale(1)"; done += 1; if (done===ids.length) res(); }
        };
        requestAnimationFrame(fn);
      }, i*45);
    });
  });
}

function doWave() {
  return new Promise(res => {
    const ids=["lM","lE1","lE2","lZ","lO"]; let done=0;
    ids.forEach((id,i) => {
      setTimeout(() => {
        const el=document.getElementById(id);
        const s=performance.now();
        const fn=now => {
          const p=Math.min((now-s)/300,1);
          const ty=p<0.5?-15*(p*2):-15*(1-(p-0.5)*2);
          el.style.transform=`translateY(${ty}px) scale(1)`;
          if(p<1) requestAnimationFrame(fn);
          else { el.style.transform='translateY(0px) scale(1)'; done += 1; if(done===ids.length) res(); }
        };
        requestAnimationFrame(fn);
      }, i*55);
    });
  });
}

function doZoomExit() {
  ["d0","d1","d2"].forEach((id,i) => {
    tween(180, i*60, e => {
      const el=document.getElementById(id);
      el.style.opacity = e;
      el.style.transform = `scale(${e})`;
    });
  });

  setTimeout(() => {
    const scene=document.getElementById("scene");
    const black=document.getElementById("blackCover");
    const home=document.getElementById("homeScreen");

    tween(320, 0, e => {
      scene.style.transform = `scale(${1+e*18})`;
      scene.style.opacity = Math.max(1-e*3,0);
    }, easeIn);

    tween(220, 200, e => {
      black.style.opacity = e;
    }, easeIn).then(() => {
      tween(280, 0, e => {
        black.style.opacity = 1-e;
        home.style.opacity = e;
      }, easeOut);
    });
  }, 500);
}

setTimeout(startAnim, 300);
</script>
</body>
